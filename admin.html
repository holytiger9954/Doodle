<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 시스템 (Admin)</title>
    <style>

</style>
    <link rel="stylesheet" href="./css/admin.css" />
    <!-- jQuery -->
    <script src="../js/jquery-3.7.1.js"></script>
    <!-- Unified API Library -->
    <script src="./js/dd.api.v1.js"></script>

    <script>
      // Admin page uses only APIs that are currently supported (read-only KPIs).
      $(function () {
        if (!window.DD || !DD.V1) {
          console.error("DD.V1 API library not loaded.");
          $("#kpiTotalMarkers").text("API 라이브러리 누락");
          $("#kpiTopTag").text("API 라이브러리 누락");
          return;
        }

        const fmt = (n) => {
          const x = Number(n);
          if (!Number.isFinite(x)) return "-";
          return x.toLocaleString("ko-KR") + " 건";
        };

        function loadTotalMarkers() {
          $("#kpiTotalMarkers").text("로딩...");
          DD.V1.Posts.list({ page: 1, pageSize: 1 })
            .done((res) => {
              const total = res && res.ok ? res.total : null;
              $("#kpiTotalMarkers").text(fmt(total));
            })
            .fail((xhr) => {
              $("#kpiTotalMarkers").text("조회 실패");
              console.error("Total markers load failed:", xhr);
            });
        }

        function loadTopTags() {
          $("#kpiTopTag").text("로딩...");
          $("#tagsTbody").html('<tr><td colspan="4" class="muted">로딩 중...</td></tr>');

          DD.V1.Tags.top({ limit: 10, days: 7 })
            .done((res) => {
              const items = (res && res.ok && Array.isArray(res.items)) ? res.items : [];
              if (!items.length) {
                $("#kpiTopTag").text("-");
                $("#tagsTbody").html('<tr><td colspan="4" class="muted">데이터 없음</td></tr>');
                return;
              }

              const top1 = items[0];
              $("#kpiTopTag").text((top1.tag || "-") + " · " + fmt(top1.count).replace(" 건",""));

              const rows = items.map((it, i) => {
                const tag = String(it.tag || "-");
                const cnt = Number(it.count || 0);
                // 관리자 액션(중단/제외)은 현재 API 미지원 → 읽기 전용 뷰만 제공
                return `
                  <tr>
                    <td class="mono">${i + 1}</td>
                    <td>${tag}</td>
                    <td class="mono">${cnt.toLocaleString("ko-KR")}</td>
                    <td><span class="badge active">조회 전용</span></td>
                  </tr>`;
              }).join("");

              $("#tagsTbody").html(rows);
            })
            .fail((xhr) => {
              $("#kpiTopTag").text("조회 실패");
              $("#tagsTbody").html('<tr><td colspan="4" class="muted">조회 실패</td></tr>');
              console.error("Top tags load failed:", xhr);
            });
        }

        // initial loads
        loadTotalMarkers();
        loadTopTags();

        // Menu tab behavior (simple)
        const $items = $(".nav-menu li");
        const $panels = $(".main-content .panel");

        $items.on("click", function () {
          $items.removeClass("active");
          $(this).addClass("active");

          const txt = $(this).text().trim();
          // Panels order: dashboard, hashtag
          if (txt.startsWith("F-5.1")) {
            $panels.hide().eq(0).show();
          } else if (txt.startsWith("F-5.3")) {
            $panels.hide().eq(1).show();
          }
        });

        // default show dashboard only
        $panels.hide().eq(0).show();
      });
    </script>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            Admin System
        </div>
        <ul class="nav-menu">
            <li class="active">F-5.1 통합 대시보드</li>
<li>F-5.3 해시태그 모니터링</li>
        </ul>
    </nav>

    <main class="main-content">
        <h1 class="page-title">관리자 관제 센터</h1>

        <section class="panel">
            <h2 class="panel-title">F-5.1 통합 대시보드 (실시간 현황)</h2>
            
            <div class="dashboard-cards">
                <div class="card">
                    <h3>총 누적 마커</h3>
                    <div class="number" id="kpiTotalMarkers">-</div>
                    <div class="sub" id="kpiTotalMarkersSub">/api/v1/dd/posts (total)</div>
                </div>
                <div class="card">
                    <h3>Top 해시태그 (최근 7일)</h3>
                    <div class="number" id="kpiTopTag">-</div>
                    <div class="sub" id="kpiTopTagSub">/api/v1/dd/tags/top?limit=1&days=7</div>
                </div>
            </div>
        </section>

<section class="panel">
            <h2 class="panel-title">F-5.3 해시태그 모니터링 (어뷰징 및 부적절 태그)</h2>
            <table>
                <thead>
                    <tr>
                        <th>순위</th>
                        <th>해시태그명</th>
                        <th>언급량(실시간)</th>
                        <th>위험도/상태</th>
                        <th>관리 (순위/자동완성 제외)</th>
                    </tr>
                </thead>
                <tbody id="tagsTbody"></tbody>
            </table>
        </section>

    </main>

</body>
</html>
