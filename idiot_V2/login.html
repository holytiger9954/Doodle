<!DOCTYPE html>
<html lang="kr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/login.css">

</head>

<body>
    <div id="dd-overlay" class="dd-overlay">
        <div class="dd-auth-box">
            <span class="close-btn" onclick="closeLogin()">&times;</span>
            <div id="login-section">
                <h2>로그인</h2>
                <form onsubmit="">
                    <input type="text" id="input-dd-id" class="dd-input" style="color:#222;" placeholder="아이디" required
                        minlength="4" maxlength="12" pattern="^[a-zA-Z][a-zA-Z0-9]*$">
                    <input type="password" id="input-dd-password" class="dd-input" style="color:#222;"
                        placeholder="비밀번호" required minlength="4" maxlength="12" pattern="^[a-zA-Z][a-zA-Z0-9]*$">
                    <p class="message" id="wo-login"></p>
                    <button type="submit" class="auth-submit-btn">접속</button>
                    <div class="a-parent">
                        <a href="./join.html">아직 회원이 아니신가요? (회원가입) </a>
                        <a href="./changePw.html">비밀번호 변경</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

<script src="./js/core/app.js"></script>
<script src="./js/core/dom.js"></script>
<script src="./js/core/storage.js"></script>
<script src="./js/core/message.js"></script>
<script src="./js/api/http.client.js"></script>
<script src="./js/api/auth.api.js"></script>
<script src="./js/api/spot.api.js"></script>
<script src="./js/ui/ui.auth.js"></script>
<script src="./js/pages/page.login.js"></script>
<script src="./js/ui/ui.standalone-modal.js"></script>
</body>

</html>
