<!DOCTYPE html>
<html lang="kr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/join.css">
</head>

<body>
    <div id="dd-overlay" class="dd-overlay">
        <div class="dd-auth-box">
            <span class="close-btn">&times;</span>
            <div id="join-section">
                <h2 style="color:#222; margin-bottom:20px;">회원가입</h2>
                <form onsubmit="">
                    <input type="text" id="input-dd-user-id" class="dd-input" placeholder=" ID : 4~12자의 영문, 숫자만 가능합니다."
                        required minlength="4" maxlength="12" pattern="^[a-zA-Z][a-zA-Z0-9]*$">
                    <input type="text" id="input-dd-user-password" class="dd-input"
                        placeholder=" 비밀번호 : 4~12자의 영문, 숫자만 가능합니다." required minlength="4" maxlength="12"
                        pattern="^[a-zA-Z][a-zA-Z0-9]*$">
                    <input type="text" id="input-dd-user-nickname" class="dd-input"
                        placeholder=" 사용할 Nickname : 2 ~ 8 자" required minlength="2" maxlength="8">
                    <button type="submit" class="auth-submit-btn">회원가입하기</button>
                </form>
            </div>
        </div>
    </div>
    <script src="./js/join.js"></script>
</body>

</html>
