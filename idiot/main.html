<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doodle</title>
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/infom.css">
    <link rel="stylesheet" href="./css/search.css">
    <link rel="stylesheet" href="./css/ranking.css">
    <link rel="stylesheet" href="./css/ui.css">
    <link rel="stylesheet" href="./css/login.css">
    <link rel="stylesheet" href="./css/join.css">
    <link rel="stylesheet" href="./css/report.css">
    <script type="text/javascript"
        src="//dapi.kakao.com/v2/maps/sdk.js?appkey=47bbd47c04e70af1e13f9280c52c609b&autoload=false&libraries=services,clusterer"></script>
</head>

<body>
    <header class="main-header">
        <a href="main.html" class="logo">Doodle</a>
        <!--
          기존 iframe 검색창을 include slot 으로 교체.
          data-include: 불러올 파셜 경로
          data-init: 삽입 후 실행할 초기화 함수
        -->
        <div class="header-search">
            <div id="search-slot" data-include="./partials/search.partial.html" data-init="App.pageSearch.init"></div>
        </div>
        <div class="header-icons">
            <button id="btn" class="menu-toggle-btn" onclick="toggleSidebar()">☰</button>
        </div>
    </header>
    

    <button class="rank-open-btn float-rank-btn" onclick="toggleRanking(event)">🏆 랭킹 보기</button>

    <div id="ranking-wrapper">
        <div id="ranking-slot" class="inline-slot" data-include="./partials/ranking.partial.html" data-init="App.pageRanking.init"></div>
    </div>
    <button class="ranking-peek-handle" onclick="toggleRanking(event)" aria-label="랭킹 패널 열기 또는 닫기"><span class="peek-label peek-label-open">열기</span><span class="peek-label peek-label-close">닫기</span><span class="peek-arrow">❮</span></button>
        
    <div id="ucon">
        <div id="ui-slot" class="inline-slot" data-include="./partials/ui.partial.html" data-init="App.uiCategorySelector.init"></div>
    </div>    

    <div id="side-mypage" class="side-panel">
        <iframe src="mypage.html" style="width: 100%; height: 100%; border: none;"></iframe>
    </div>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!--
      공용 오버레이 모달 레이어.
      login / join / report / changePw 를 페이지 이동 없이 이 위에 올린다.
    -->
    <div id="app-modal-overlay" class="app-modal-overlay">
        <div id="app-modal-content" class="app-modal-content"></div>
    </div>


    <button id="savebtn" class="action-btn-save">📍 장소 등록</button>

    <div id="register-modal" class="dd-overlay hidden">
        <div class="register-modal-content" style="width: 450px; height: 600px; position: relative;">
            <iframe id="register-iframe" src=""
                style="width: 100%; height: 100%; border: none; border-radius: 22px;"></iframe>
        </div>
    </div>



    <button id="mylocation" aria-label="현재 위치" title="현재 위치">⌖</button>

    <div id="map"></div>
    <div id="bottom-sheet-backdrop" class="bottom-sheet-backdrop"></div>
    <!-- 바이브코딩 -->
    <!--
      기존 하단 바텀시트 대신 지도 위 팝업 카드처럼 보이도록 구조 단순화.
      실제 내용은 info.html 템플릿을 #sheet-data 에 주입한다.
    -->
    <div id="bottom-sheet" class="bottom-sheet map-info-popup" role="dialog" aria-modal="true" aria-label="장소 정보 팝업">
        <div class="sheet-content popup-content">
            <div id="sheet-data"></div>
        </div>
    </div>

    <div id="app-toast" class="app-toast" aria-live="polite" aria-atomic="true"></div>

<script src="./js/core/app.js"></script>
<script src="./js/core/dom.js"></script>
<script src="./js/core/storage.js"></script>
<script src="./js/core/message.js"></script>
<script src="./js/core/include.loader.js"></script>
<script src="./js/pages/page.search.js"></script>
<script src="./js/pages/page.login.js"></script>
<script src="./js/pages/page.join.js"></script>
<script src="./js/pages/page.change-password.js"></script>
<script src="./js/pages/page.ranking.js"></script>

<script src="./js/ui/ui.category.selector.js"></script>
<script src="./js/ui/ui.auth.js"></script>
<script src="./js/ui/ui.report.js"></script>
<script src="./js/ui/ui.modal.js"></script>
<script src="./js/api/http.client.js"></script>
<script src="./js/api/auth.api.js"></script>
<script src="./js/api/spot.api.js"></script>
<script src="./js/api/comment.api.js"></script>
<script src="./js/api/report.api.js"></script>
<script src="./js/data/category.data.js"></script>
<script src="./js/pages/page.main.js"></script>
</body>

</html>
