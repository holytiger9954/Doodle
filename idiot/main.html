<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPOT MAP 📍 - Doodle</title>
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/main.css">
    <script type="text/javascript"
        src="//dapi.kakao.com/v2/maps/sdk.js?appkey=47bbd47c04e70af1e13f9280c52c609b&autoload=false&libraries=services,clusterer"></script>
</head>

<body>
    <header class="main-header">
        <a href="main.html" class="logo">SPOT MAP 📍</a>
        <!-- header s-->
        <div class="header-search">
            <button class="search-btn">검색 🔍</button>
        </div>
        <!-- header e-->
         <!-- hamberg s-->
        <div class="header-icons">
            <!-- <button id="login-open-btn" class="login-trigger-btn" onclick="openLogin()">로그인</button> -->
            <button id="btn" class="menu-toggle-btn">☰</button>
        </div>
        <!-- hamberg e-->
    </header>

    <div id="ranking-wrapper">
        <iframe src="ranking.html" style="width: 100%; height: 100%; border: none;"></iframe>
    </div>

    <button id="savebtn" class="action-btn-save">📍 장소 등록</button>
    <button id="mylocation">🎯</button>

    <div id="map"></div>

    <!-- 이건 카카오맵 api -->
    <script>
        kakao.maps.load(function () {
            var container = document.getElementById('map'); // 지도를 담을 영역의 DOM 레퍼런스
            var options = {
                center: new kakao.maps.LatLng(33.450701, 126.570667), // 지도의 중심좌표 (위도, 경도)
                level: 3 // 지도의 레벨(확대, 축소 정도)
            };

            var map = new kakao.maps.Map(container, options); // 지도 생성 및 객체 리턴
        });
    </script>
</body>

</html>
