<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPOT MAP 📍 - Doodle</title>
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/main.css">
    <script type="text/javascript"
        src="//dapi.kakao.com/v2/maps/sdk.js?appkey=47bbd47c04e70af1e13f9280c52c609b&autoload=false&libraries=services,clusterer"></script>
    <script src="/idiot/js/marker.js"></script>
</head>

<body>
    <header class="main-header">
        <a href="main.html" class="logo">SPOT MAP 📍</a>
        <div class="header-search">
            <button class="search-btn">검색 🔍</button>
        </div>
        <div class="header-icons">
            <button id="btn" class="menu-toggle-btn" onclick="toggleSidebar()">☰</button>
        </div>
    </header>

    <button class="rank-open-btn float-rank-btn" onclick="toggleRanking(event)">🏆 랭킹 보기</button>

    <div id="ranking-wrapper"> <button class="close-ranking" onclick="toggleRanking(event)">×</button>
        <iframe src="ranking.html" style="width: 100%; height: 100%; border: none; border-radius: 15px;"></iframe>
    </div>


    <div id="side-mypage" class="side-panel">
        <div class="side-header">
            <h3>MY PAGE</h3>
            <button class="close-panel" onclick="toggleSidebar()">×</button>
        </div>
        <div class="category-list">
            <div id="marker" class="marker"></div>
            <button type="button" class="side-btn"><img src="./img/별.png"> <span>찜 목록</span></button>
            <button type="button" class="side-btn"><img src="./img/병원.png"> <span>병원</span></button>
            <button type="button" class="side-btn"><img src="./img/체육관.png"> <span>체육관</span></button>
            <button type="button" class="side-btn"><img src="./img/경찰서.png"> <span>경찰서</span></button>
            <button type="button" class="side-btn"><img src="./img/담배.png"> <span>흡연부스</span></button>
            <button type="button" class="side-btn"><img src="./img/화장실.png"> <span>공중 화장실</span></button>
        </div>
        <div class="side-ad">광고 영역 (Doodle Ads)</div>
    </div>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <button id="savebtn" class="action-btn-save">📍 장소 등록</button>
    
    <div id="register-modal" class="dd-overlay hidden">
        <div class="register-modal-content" style="width: 450px; height: 600px; position: relative;">
            <iframe id="register-iframe" src=""
                style="width: 100%; height: 100%; border: none; border-radius: 15px;"></iframe>
        </div>
    </div>

    <button id="mylocation">🎯</button>

    <div id="map"></div>

    <script src="./js/main.js"></script>
</body>

</html>
