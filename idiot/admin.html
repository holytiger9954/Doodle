<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doodle Map 관리자 페이지</title>
  <link rel="stylesheet" href="./css/common.css">
  <link rel="stylesheet" href="./css/admin.css">
</head>
<body class="admin-page">
  <header class="admin-header">
    <div>
      <p class="admin-eyebrow">DOODLE MAP ADMIN</p>
      <h1>운영 관리</h1>
      <p class="admin-desc">로컬 모드 기준 운영 도구예요. 장소, 댓글, 신고 현황을 한 화면에서 관리할 수 있어요.</p>
    </div>
    <div class="admin-header-actions">
      <button type="button" id="admin-refresh" class="admin-header-btn">새로고침</button>
      <a href="./main.html" class="admin-header-btn admin-header-link">메인으로</a>
    </div>
  </header>

  <main class="admin-main">
    <section id="admin-login-gate" class="admin-login-gate hidden">
      <h2>로그인이 필요합니다</h2>
      <p>운영 관리는 로그인 후 확인할 수 있어요.</p>
      <a href="./main.html" class="admin-cta-link">메인 화면으로 이동</a>
    </section>

    <section id="admin-app">
      <section class="admin-summary-grid">
        <article class="admin-summary-card"><span>전체 회원</span><strong id="summary-users">0</strong></article>
        <article class="admin-summary-card"><span>사용자 등록 장소</span><strong id="summary-spots">0</strong></article>
        <article class="admin-summary-card"><span>공개 장소</span><strong id="summary-public-spots">0</strong></article>
        <article class="admin-summary-card"><span>숨김 장소</span><strong id="summary-hidden-spots">0</strong></article>
        <article class="admin-summary-card"><span>전체 댓글</span><strong id="summary-comments">0</strong></article>
        <article class="admin-summary-card"><span>신고 대기</span><strong id="summary-pending-reports">0</strong></article>
      </section>

      <section class="admin-tabs">
        <button type="button" class="admin-tab is-active" data-tab="dashboard">대시보드</button>
        <button type="button" class="admin-tab" data-tab="spots">장소 관리</button>
        <button type="button" class="admin-tab" data-tab="comments">댓글 관리</button>
        <button type="button" class="admin-tab" data-tab="reports">신고 관리</button>
      </section>

      <section class="admin-panel is-active" data-panel="dashboard">
        <div class="admin-two-col">
          <div class="admin-card">
            <div class="admin-card-head"><h2>최근 등록 장소</h2></div>
            <div id="dashboard-recent-spots" class="admin-stack-list"></div>
          </div>
          <div class="admin-card">
            <div class="admin-card-head"><h2>최근 댓글</h2></div>
            <div id="dashboard-recent-comments" class="admin-stack-list"></div>
          </div>
        </div>
      </section>

      <section class="admin-panel" data-panel="spots">
        <div class="admin-toolbar">
          <input id="spot-search" type="search" class="admin-input" placeholder="장소 제목, 작성자, 주소 검색">
          <select id="spot-filter" class="admin-select">
            <option value="all">전체</option>
            <option value="public">공개</option>
            <option value="private">비공개</option>
            <option value="hidden">숨김</option>
            <option value="shared">공유 스팟</option>
          </select>
        </div>
        <div id="admin-spot-list" class="admin-list"></div>
      </section>

      <section class="admin-panel" data-panel="comments">
        <div class="admin-toolbar">
          <input id="comment-search" type="search" class="admin-input" placeholder="댓글 내용, 작성자, 장소 제목 검색">
          <select id="comment-filter" class="admin-select">
            <option value="all">전체</option>
            <option value="visible">표시 중</option>
            <option value="hidden">숨김</option>
          </select>
        </div>
        <div id="admin-comment-list" class="admin-list"></div>
      </section>

      <section class="admin-panel" data-panel="reports">
        <div class="admin-toolbar">
          <input id="report-search" type="search" class="admin-input" placeholder="신고 사유, 대상, 신고자 검색">
          <select id="report-filter" class="admin-select">
            <option value="all">전체</option>
            <option value="pending">대기</option>
            <option value="resolved">처리 완료</option>
            <option value="ignored">무시</option>
          </select>
        </div>
        <div id="admin-report-list" class="admin-list"></div>
      </section>
    </section>
  </main>

<script src="./js/core/app.js"></script>
<script src="./js/core/dom.js"></script>
<script src="./js/core/storage.js"></script>
<script src="./js/api/http.client.js"></script>
<script src="./js/api/auth.api.js"></script>
<script src="./js/api/spot.api.js"></script>
<script src="./js/api/comment.api.js"></script>
<script src="./js/api/report.api.js"></script>
<script src="./js/data/category.data.js"></script>
<script src="./js/pages/page.admin.js"></script>
</body>
</html>
