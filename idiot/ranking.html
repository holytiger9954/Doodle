<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hashtag Ranking - SPOT MAP</title>
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/ranking.css">
</head>

<body>

    <div class="ranking-container">
        <h2 class="ranking-title">인기 해시태그 랭킹</h2>

        <div class="ranking-list">
            <div class="ranking-item">
                <span class="rank-number">1</span>
                <div class="hashtag-info">
                    <span class="hashtag-name">#분위기좋은카페</span>
                    <div class="count-bar">
                        <div class="count-fill" style="width: 95%;"></div>
                    </div>
                </div>
                <span class="count-text">1,240</span>
            </div>

            <div class="ranking-item">
                <span class="rank-number">2</span>
                <div class="hashtag-info">
                    <span class="hashtag-name">#야경명소</span>
                    <div class="count-bar">
                        <div class="count-fill" style="width: 80%;"></div>
                    </div>
                </div>
                <span class="count-text">982</span>
            </div>

            <div class="ranking-item">
                <span class="rank-number">3</span>
                <div class="hashtag-info">
                    <span class="hashtag-name">#데이트코스</span>
                    <div class="count-bar">
                        <div class="count-fill" style="width: 65%;"></div>
                    </div>
                </div>
                <span class="count-text">756</span>
            </div>
        </div>
    </div>
</body>

</html>
