<div class="info-window dd-auth-box">
    <div class="info-header">
        <img id="info-image" src="./img/marker.png" alt="장소 이미지">
        <strong id="info-title">장소 이름</strong>
        <button type="button" class="close-btn" onclick="closeOverlay()">×</button>
    </div>
    <div class="info-body">
        <p class="info-category" id="info-category">카테고리</p>
        <p class="address mg" id="info-address">주소 정보가 없습니다.</p>
        <p class="desc mg" id="info-desc">설명 정보가 없습니다.</p>
        <div class="info-tags hidden" id="info-tags"></div>
        <p class="info-owner mg hidden" id="info-owner"></p>
        <div class="info-details" id="info-details">
            <div class="info-detail-row"><span class="info-detail-label">카테고리</span><span id="detail-category">-</span></div>
            <div class="info-detail-row"><span class="info-detail-label">상세주소</span><span id="detail-address">-</span></div>
            <div class="info-detail-row"><span class="info-detail-label">공개범위</span><span id="detail-visibility">-</span></div>
            <div class="info-detail-row"><span class="info-detail-label">등록자</span><span id="detail-owner">-</span></div>
            <div class="info-detail-row"><span class="info-detail-label">등록일</span><span id="detail-created">-</span></div>
            <div class="info-detail-row"><span class="info-detail-label">좌표</span><span id="detail-coords">-</span></div>
            <div class="info-detail-row info-detail-row-tags"><span class="info-detail-label">해시태그</span><span id="detail-tags">-</span></div>
        </div>
    </div>
    <div class="info-footer">
        <button class="btn-detail auth-submit-btn" id="info-link" type="button">추가정보</button>
        <button class="auth-submit-btn" id="favorite-toggle" type="button">찜하기</button>
        <button class="auth-submit-btn hidden" id="delete-spot" type="button">삭제</button>
        <button id="report" class="auth-submit-btn" type="button">신고</button>
    </div>
</div>
