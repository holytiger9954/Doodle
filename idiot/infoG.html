<body>

        <!-- 1. 이미지와 버튼, 해시태그를 모두 header 안으로 모았습니다 -->
        <div class="info-header">
            <img src="https://search.pstatic.net/common/?src=http%3A%2F%2Fblogfiles.naver.net%2FMjAyMzA5MjdfODQg%2FMDAxNjk1Nzc1MjM3MTUw.hqlues0oA0UwprXXGZ4aq5Xb7HwGb4S3NKYWXn5bEykg.ioljAlpR6KdV6b1gwduHlf-j3We6kbaEuYhPZAqjBQYg.PNG.sdplace%2F%25BD%25BD%25B6%25F3%25C0%25CC%25B5%25E52.png&type=sc960_832"

            <button type="button" class="close-btn" onclick="closeOverlay()">×</button>

        <!-- 2. 텍스트 정보만 body에 남겼습니다 -->
        <div class="info-body">
            <p class="address mg" id="info-address">주소 : 충남 천안시 서북구 와촌동 106-19 (천안천 자전거도로)</p>
            <p class="desc mg" id="info-desc">상세위치 : 천안역 근처 천안천 갈림길</p>
        </div>

        <!-- 3. 하단 버튼 영역들 -->
        <div class="info-footer">
            <button class="btn-detail auth-submit-btn" id="info-link">상세보기</button>
            <button class="btn-detail auth-submit-btn" id="info-link">리뷰</button>
            <button id="report" class="auth-submit-btn">신고</button>
        </div>
    </div>
    <script src="./js/info.js"></script>
