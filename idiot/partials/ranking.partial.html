<!-- 동적 해시태그 랭킹 파셜 -->
<div class="ranking-container">
  <h2 class="ranking-title">인기 해시태그 랭킹</h2>
  <p class="ranking-subtitle" id="ranking-subtitle">해시태그를 클릭하면 해당 태그가 있는 장소만 볼 수 있어요.</p>
  <div class="ranking-filter-bar hidden" id="ranking-filter-bar">
    <div id="ranking-filter-text" class="ranking-filter-tags"></div>
    <button type="button" id="ranking-filter-clear">전체 보기</button>
  </div>
  <div class="ranking-list" id="ranking-list"></div>
  <p class="ranking-empty hidden" id="ranking-empty">아직 등록된 해시태그가 없어요.</p>
</div>
