<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>api 테스트</title>

  <link rel="stylesheet" href="./css/phi.css" />

  <script src="./jquery-3.7.1.js"></script>
  <script src="./js/dd.api.v1.js" defer></script>

  <script defer>
    $(() => {

      /* =========================================================
       * 전체 API 목록
       * =========================================================
       *
       * [DD 그룹] base: /api/v1/dd
       * DD-1) GET  /dd/posts
       * DD-2) GET  /dd/posts/:postNo
       * DD-3) POST /dd/posts
       * DD-4) GET  /dd/posts/:postNo/comments
       * DD-5) POST /dd/posts/:postNo/comments
       * DD-6) GET  /dd/tags/top
       *
       * [TB 그룹] base: /api/v1
       * TB-LOD-1) GET  /lodging/properties
       * TB-LOD-2) GET  /lodging/properties/:propertyId
       * TB-LOD-3) GET  /lodging/properties/:propertyId/rooms
       * TB-LOD-4) GET  /lodging/properties/:propertyId/reviews
       *
       * TB-AUTH-1) GET  /auth/check-login-id
       * TB-AUTH-2) POST /auth/signup
       * TB-AUTH-3) POST /auth/login
       *
       * [SJ 그룹] base: /api/v1/sj
       * SJ-AUTH-1) GET  /sj/auth/check-login-id
       * SJ-AUTH-2) POST /sj/auth/signup
       * SJ-AUTH-3) POST /sj/auth/login
       * ========================================================= */

      const RUN = {
        DD: { postsFlow: true, tagsTop10: true },
        TB: { lodgingChain: false, searchLog: false, wishlist: false, auth: true },
        SJ: { auth: false, postsAndComments: false }
      };

      const logCall = (label, method, url, body) => {
        console.log(`[CALL] ${label} :: ${method} ${url}`);
        if (body !== undefined) console.log(`[BODY]`, body);
      };

      const logRes = (label, res) => console.log(`[RES] ${label}`, res);
      const logErr = (label, xhr) => {
        const rj = xhr?.responseJSON;
        console.log(`[ERR] ${label}`, rj || xhr);
      };

      // ================================
      // TB AUTH FLOW
      // ================================
      const tbRunAuth = async () => {

        const TB_ID = "tb_test11";
        const TB_PW = "1234";
        const TB_NAME = "TB테스트";

        // 1) 아이디 체크
        const checkQ = { loginId: TB_ID };
        const checkUrl = DD.V1.url(DD.V1.API.TB_AUTH_CHECK_ID, null, checkQ);
        logCall("TB-AUTH-1 CHECK_ID", "GET", checkUrl);

        let checkRes;
        try {
          checkRes = await DD.V1.TB.Auth.checkLoginId(checkQ);
          logRes("TB-AUTH-1 CHECK_ID", checkRes);
        } catch (e) {
          logErr("TB-AUTH-1 CHECK_ID", e);
          return;
        }

        const exists = !!checkRes?.exists;

        // 2) 회원가입
        if (!exists) {
          const signupBody = {
            loginId: TB_ID,
            password: TB_PW,
            displayName: TB_NAME
          };

          const signupUrl = DD.V1.url(DD.V1.API.TB_AUTH_SIGNUP);
          logCall("TB-AUTH-2 SIGNUP", "POST", signupUrl, signupBody);

          try {
            const signupRes = await DD.V1.TB.Auth.signup(signupBody);
            logRes("TB-AUTH-2 SIGNUP", signupRes);
          } catch (e) {
            logErr("TB-AUTH-2 SIGNUP", e);
            return;
          }
        } else {
          console.log("[SKIP] 이미 존재");
        }

        // 3) 로그인
        const loginBody = { loginId: TB_ID, password: TB_PW };
        const loginUrl = DD.V1.url(DD.V1.API.TB_AUTH_LOGIN);
        logCall("TB-AUTH-3 LOGIN", "POST", loginUrl, loginBody);

        try {
          const loginRes = await DD.V1.TB.Auth.login(loginBody);
          logRes("TB-AUTH-3 LOGIN", loginRes);
        } catch (e) {
          logErr("TB-AUTH-3 LOGIN", e);
        }
      };

      // ================================
      // 실행
      // ================================
      (async () => {

        if (RUN.TB.auth) {
          await tbRunAuth();
        }

      })();

    });
  </script>
</head>

<body>
</body>

</html>
