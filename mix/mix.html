<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPOT MAP 📍</title>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="./mix.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script type="text/javascript"
        src="//dapi.kakao.com/v2/maps/sdk.js?appkey=47bbd47c04e70af1e13f9280c52c609b&autoload=false"></script>
    <script src="./dd.api.v1.js"></script>
    <script src="./mix.js" defer></script>
</head>

<body>
    <header class="main-header">
        <div class="logo">SPOT MAP 📍</div>
        <div class="header-search">
            <input type="text" id="search-input" placeholder="주변 장소 검색...">
            <button class="search-btn">🔍</button>
        </div>
        <div class="header-icons">
            <button id="login-open-btn" class="login-trigger-btn" onclick="openLogin()">로그인</button>
        </div>
    </header>

    <button id="btn" class="menu-toggle-btn">☰</button>
    <button id="savebtn" class="action-btn-save">📍 장소 등록</button>
    <button id="mylocation">🎯</button>

    <div id="sidebar" class="sidebar">
        <span class="side-close-btn" onclick="toggleSidebar(false)">&times;</span>
        <div class="sidebar-content" id="sidebar-content">
        </div>
    </div>

    <div id="saveside" class="sidebar">
        <span class="side-close-btn" onclick="toggleSaveSide(false)">&times;</span>
        <div class="sidebar-content">
            <h3 style="margin-bottom:20px;">새 장소 등록</h3>
            <select id="category" class="dd-input">
                <option value="흡연">흡연 부스</option>
                <option value="내장소">나만의 장소</option>
            </select>
            <input id="savelat" type="text" class="dd-input" placeholder="위도" readonly>
            <input id="savelng" type="text" class="dd-input" placeholder="경도" readonly>
            <textarea id="hash" class="dd-input" style="height:120px;" placeholder="장소 이름 및 설명 (#태그 포함)"></textarea>
            <button id="saveend" class="auth-submit-btn">서버에 저장하기</button>
        </div>
    </div>

    <div id="dd-overlay" class="dd-overlay">
        <div class="dd-auth-box">
            <span class="close-btn" onclick="closeLogin()">&times;</span>
            <div id="login-section">
                <h2 style="color:#222; margin-bottom:20px;">로그인</h2>
                <form onsubmit="handleLogin(event)">
                    <input type="text" id="input-dd-user-id" class="dd-input" style="background:#f5f5f5; color:#222;"
                        placeholder="아이디" required>
                    <input type="password" id="input-dd-password" class="dd-input"
                        style="background:#f5f5f5; color:#222;" placeholder="비밀번호" required>
                    <button type="submit" class="auth-submit-btn">접속</button>
                </form>
            </div>
        </div>
    </div>

    <div id="map"></div>
</body>

</html>
